name: Supabase keep-alive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping no banco
        run: |
          status=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $status"
          cat /tmp/resp.txt
          [ "$status" = "200" ] || exit 1

      - name: Renova o agendamento (impede desativação por 60 dias)
        uses: gautamkrishnar/keepalive-workflow@v2
